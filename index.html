<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourfriendlyweb</title>
    <link rel="stylesheet" href="wwwroot/css/site.css"> 
</head>
<body>

    <div class="container">
        <h1>Welcome to yourfriendlyweb!</h1>
        <p class="subtitle">✿ take a deep breath and let your worries drift away ✿</p>
        
        <div id="jar-container" style="cursor: pointer;">
            <p>feeling heavy? tap the jar to get a gentle reminder...</p>
        </div>
    </div>

    <div id="thought-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="flower-icon">✿</span>
            
            <p id="modal-thought-text">Loading a gentle thought...</p>
            
            <div class="modal-buttons">
                <button id="btn-next-leaf">pick another leaf 🍃</button>
                <button id="btn-close-box">close box ✿</button>
            </div>
        </div>
    </div>

    <script src="wwwroot/js/thoughts.js"></script>
    <script src="wwwroot/js/app.js"></script>
</body>
</html>
