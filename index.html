<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page - yourfriendlyweb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pink: #fca8b4;
            --card-white: #fff0f2;
            --text-dark: #5c4a49;
            --accent-purple: #6e5554;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-pink);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Top Header Navbar Matching Your Original Design */
        header {
            background-color: rgba(252, 168, 180, 0.5);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: 'Comfortaa', cursive;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-purple);
            text-decoration: none;
        }

        .nav-links a {
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
        }

        /* Main Cozy Workspace Content Container */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 5;
        }

        /* The Beautiful Large Rounded Card Layout */
        .main-card {
            background-color: var(--card-white);
            border-radius: 35px;
            padding: 50px 40px;
            max-width: 750px;
            width: 100%;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent-purple);
            margin: 0 0 15px 0;
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-purple);
            margin-bottom: 30px;
        }

        .description {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-dark);
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .divider {
            border: none;
            border-top: 1px dashed rgba(110, 85, 84, 0.3);
            margin: 30px auto;
            width: 90%;
        }

        .prompt-text {
            font-size: 1.1rem;
            font-style: italic;
            font-weight: 700;
            color: var(--accent-purple);
            margin-bottom: 25px;
        }

        /* Clickable Jar Wrapper Layout */
        .jar-box {
            display: inline-block;
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .jar-box:hover {
            transform: scale(1.05);
        }

        .jar-box:active {
            transform: scale(0.95);
        }

        .jar-image-placeholder {
            width: 90px;
            height: 120px;
            border: 3px solid var(--accent-purple);
            border-radius: 20px 20px 30px 30px;
            position: relative;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.4);
        }

        .jar-image-placeholder::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 12px;
            background-color: var(--accent-purple);
            border-radius: 5px;
        }

        /* Background Animated Sakura System */
        .sakura-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.6);
            border-radius: 150px 0px 150px 150px;
            animation: drift linear infinite;
        }

        @keyframes drift {
            0% { transform: translateY(-10vh) translateX(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(105vh) translateX(120px) rotate(360deg); opacity: 0.1; }
        }

        /* --- THE MODAL OVERLAY BOX (Your exact layout style) --- */
        .modal-blur-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(110, 85, 84, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-blur-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

            border: 3px solid var(--accent-purple);
