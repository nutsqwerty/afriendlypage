<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yourfriendlyweb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fca8b4; 
            --text-main: #ffffff;
            --accent-pink: #fff0f2;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            text-align: center;
            position: relative;
        }

        /* Sakura Rain System */
        .sakura-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background-color: var(--accent-pink);
            border-radius: 150px 0px 150px 150px;
            opacity: 0.8;
            transform-origin: left bottom;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 0.8;
            }
            100% {
                transform: translateY(105vh) translateX(100px) rotate(360deg);
                opacity: 0.2;
            }
        }

        /* Main Workspace Container */
        .main-content {
            z-index: 10;
            max-width: 600px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            font-size: 2.5rem;
            margin: 0;
            color: #ffffff;
        }

        .subtitle {
            font-size: 1.1rem;
            font-style: italic;
            opacity: 0.9;
        }

        .description {
            font-size: 1.1rem;
            line-height: 1.6;
        }

        /* The Interactive Comfort Jar */
        .jar-container {
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.2s ease;
            position: relative;
            display: inline-block;
            -webkit-tap-highlight-color: transparent; /* Fixes mobile tap flashing */
        }

        .jar-container:hover {
            transform: scale(1.05);
        }

        .jar-container:active {
            transform: scale(0.95) rotate(-3deg);
        }

        .jar-svg {
            width: 140px;
            height: 180px;
            filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.1));
        }

        /* Fixed crisp white fills for the SVG paths */
        .jar-svg path {
            stroke: #ffffff !important;
            stroke-width: 2.5px;
        }

        .jar-svg .jar-lid, .jar-svg .jar-neck {
            fill: #ffffff !important;
        }

        .jar-svg .jar-body {
            fill: rgba(255, 255, 255, 0.25) !important;
        }

        .jar-svg .jar-heart {
            fill: #ffffff !important;
            stroke: none !important;
        }

        /* Floating thoughts box - Fixed Text Visibility */
        .message-box {
            min-height: 60px;
            font-family: 'Comfortaa', cursive;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffffff !important; /* Forces solid white text color */
            padding: 15px 25px;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.2); 
            border: 2px dashed #ffffff;
            width: 80%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="sakura-container" id="sakura-box"></div>

    <div class="main-content">
        <h1>Welcome to yourfriendlyweb!</h1>
        <p class="subtitle">✿ take a deep breath and let your worries drift away ✿</p>
        <p class="description">
            This is your safe, quiet corner of the internet to just be, unwind, and rest. 
            Wrap yourself in a cozy blanket, watch the falling petals, and stay as long as you need.
        </p>

        <div class="jar-container" onclick="drawThought()">
            <svg class="jar-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
                <path class="jar-lid" d="M35 15 h30 v6 h-30 z"/>
                <path class="jar-neck" d="M38 21 h24 v8 h-24 z"/>
                <path class="jar-body" d="M38 29 C25 35 20 50 20 75 C20 100 30 110 50 110 C70 110 80 100 80 75 C80 50 75 35 62 29 Z"/>
                <path class="jar-heart" d="M50 65 C50 65 43 58 43 53 C43 49 46 46 50 50 C54 46 57 49 57 53 C57 58 50 65 50 65 Z"/>
            </svg>
        </div>

        <div class="message-box" id="thought-display">
            Tap the jar to get a gentle reminder...
        </div>
    </div>

    <script>
        // Array of comfort thoughts
        const thoughts = [
            "You are doing much better than you give yourself credit for.",
            "It is completely okay to take a break right now.",
            "Mistakes are just data points. Look how much you learned today!",
            "Take one deep breath. In... and out. You've got this.",
            "Your value isn't tied to your productivity. Rest is productive too.",
            "Proud of you for trying your best.",
            "Whatever is feeling heavy right now will pass eventually."
        ];

        function drawThought() {
            const display = document.getElementById('thought-display');
            const randomIndex = Math.floor(Math.random() * thoughts.length);
            display.innerText = thoughts[randomIndex];
        }

        // Generate Falling Sakura Petals dynamically
        const sakuraBox = document.getElementById('sakura-box');
        const petalCount = 30;

        for (let i = 0; i < petalCount; i++) {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            
            const size = Math.random() * 8 + 6; 
            petal.style.width = `${size}px`;
            petal.style.height = `${size + 4}px`;
            
            petal.style.left = `${Math.random() * 100}vw`;
            petal.style.animationDuration = `${Math.random() * 6 + 6}s`;
            petal.style.animationDelay = `${Math.random() * 5}s`;
            
            sakuraBox.appendChild(petal);
        }
    </script>
</body>
</html>
